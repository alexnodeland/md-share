<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md-share</title>
    <meta name="description" content="Render, share, and export Markdown — no server required." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="logo">md<span>-share</span></div>
      <div class="sep"></div>
      <span class="flavor-label hide-mobile">Flavor</span>
      <select id="flavor-select" title="Markdown flavor">
        <option value="gfm" selected>GitHub</option>
        <option value="commonmark">CommonMark</option>
        <option value="extended">Extended</option>
        <option value="academic">Academic</option>
        <option value="obsidian">Obsidian</option>
        <option value="atlassian">Atlassian</option>
      </select>
      <div class="spacer"></div>
      <div class="view-toggle mobile-only">
        <button type="button" id="btn-edit-view" class="active">Edit</button>
        <button type="button" id="btn-preview-view">View</button>
      </div>
      <div class="topbar-group">
        <button type="button" id="listen-btn" title="Listen to document">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M15.54 8.46a5 5 0 010 7.07" />
            <path d="M19.07 4.93a10 10 0 010 14.14" />
          </svg>
          <span class="hide-mobile">Listen</span>
        </button>
        <div class="sep hide-mobile"></div>
        <button type="button" id="btn-theme" class="icon-only" title="Toggle theme">
          <svg aria-hidden="true" id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
          </svg>
          <svg
            aria-hidden="true"
            id="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="display: none"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button type="button" id="btn-link" title="Share (Ctrl+S)">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" />
            <polyline points="16 6 12 2 8 6" />
            <line x1="12" y1="2" x2="12" y2="15" />
          </svg>
          <span class="hide-mobile">Share</span>
        </button>
        <div style="position: relative">
          <button type="button" data-dropdown="export-menu" title="Export">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span class="hide-mobile">Export</span>
          </button>
          <div class="dropdown" id="export-menu" style="right: 0">
            <button type="button" id="btn-export-md">↓ &ensp;Markdown (.md)</button>
            <button type="button" id="btn-export-html">↓ &ensp;HTML snippet</button>
            <button type="button" id="btn-export-png">↓ &ensp;PNG image</button>
            <button type="button" id="btn-export-pdf">↓ &ensp;PDF (print)</button>
          </div>
        </div>
      </div>
    </div>
    <div class="readonly-banner" id="readonly-banner">
      Viewing a shared document — edit to make it yours
    </div>
    <div class="main" id="main-container">
      <div class="editor-pane mobile-visible" id="editor-pane">
        <div class="pane-header">
          Editor
          <span class="shortcut hide-mobile"><kbd>Ctrl</kbd>+<kbd>E</kbd> toggle</span>
          <select id="sample-select" class="sample-select" title="Load a sample document">
            <option value="" disabled selected>Samples</option>
            <option value="gfm">GitHub</option>
            <option value="commonmark">CommonMark</option>
            <option value="extended">Extended</option>
            <option value="academic">Academic</option>
            <option value="obsidian">Obsidian</option>
            <option value="atlassian">Atlassian</option>
          </select>
          <button type="button" id="btn-clear" class="pane-action" title="Clear editor">Clear</button>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
      <div class="preview-pane" id="preview-pane">
        <div class="pane-header">Preview</div>
        <div class="preview-scroll" id="preview-scroll">
          <div class="rendered" id="preview"></div>
        </div>
      </div>
    </div>

    <div class="audio-bar" id="audio-bar">
      <button type="button" id="audio-back-btn" class="icon-only" title="Previous section">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="19 20 9 12 19 4 19 20" />
          <line x1="5" y1="19" x2="5" y2="5" />
        </svg>
      </button>
      <button type="button" id="audio-play-btn" class="icon-only" title="Play / Pause">
        <svg aria-hidden="true" id="audio-icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
        <svg
          aria-hidden="true"
          id="audio-icon-pause"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="display: none"
        >
          <rect x="6" y="4" width="4" height="16" />
          <rect x="14" y="4" width="4" height="16" />
        </svg>
      </button>
      <button type="button" id="audio-fwd-btn" class="icon-only" title="Next section">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 4 15 12 5 20 5 4" />
          <line x1="19" y1="5" x2="19" y2="19" />
        </svg>
      </button>
      <button type="button" id="audio-stop-btn" class="icon-only" title="Stop">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="6" width="12" height="12" rx="1" />
        </svg>
      </button>
      <div class="ab-progress" id="audio-progress">
        <div class="ab-progress-fill" id="audio-progress-fill" style="width: 0%"></div>
      </div>
      <div class="ab-label" id="audio-label"><strong>Ready</strong></div>
      <select id="audio-voice" title="Voice"></select>
      <select id="audio-speed" title="Speed">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </div>

    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-overlay-inner">Drop .md file to load</div>
    </div>
    <div class="modal-overlay" id="link-modal">
      <div class="modal">
        <h3>Share this document</h3>
        <div class="url-warn" id="url-warn"></div>
        <div class="url-box" id="link-url"></div>
        <div class="modal-actions">
          <button type="button" id="btn-link-close">Close</button>
          <button type="button" id="btn-link-copy" class="primary">Copy URL</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
